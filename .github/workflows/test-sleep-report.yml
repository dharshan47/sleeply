name: Test Monthly Sleep Email Report

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email address to send the test report to'
        required: true
        type: string

jobs:
  test-send-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*" 
          cache: "npm"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --legacy-peer-deps
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 4️⃣ Generate Prisma Client
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 5️⃣ Run test sleep report script
      - name: Send Test Sleep Report
        run: |
          echo "🚀 Running with tsx-native-fix-v2"
          npm run test:report -- "${{ github.event.inputs.email }}"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      # 6️⃣ Optional: notify if workflow fails
      - name: Notify on failure
        if: failure()
        run: echo "❌ Test Monthly Sleep Report workflow failed. Check logs."
